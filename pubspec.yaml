name: facebook_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/Splash_Screen.png


  android_12:
    color: "#FFFFFF"
    image: assets/images/Splash_Screen.png
    icon_background_color: "#FFFFFF"

  android: true
  ios: true
  fullscreen: true
